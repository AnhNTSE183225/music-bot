# MusicBot Configuration
# This single configuration file replaces yt_blacklist.txt, special.txt, etc.

# Discord Bot Settings
discord:
  command_prefix: "!"
  token_env_var: "DISCORD_TOKEN"

# Voice & Playback Settings
playback:
  default_volume: 0.5  # 0.0 - 1.0 (50%)
  connection_timeout: 10.0
  connection_stabilize_delay: 0.5

# YouTube / YTDL Settings
youtube:
  # Regex patterns to blacklist (one per line, supports comments with #)
  blacklist_patterns:
    # Block songs with explicit content
    - "(?i)(explicit|clean version)"
    # Block copyright-striked videos
    - "(?i)(copyright|dmca|removed)"
    # Block ads or trailers
    - "(?i)(trailer|advertisement|promo)"
    # Historical blocked patterns (from legacy yt_blacklist.txt)
    - "(?i)\\b9+\\s*[dđ](?:[oóòỏõọôồốổỗộơờớởỡợ])(?:[aáàảãạăằắẳẵặâầấẩẫậ])\\s*(?:h(?:[oóòỏõọôồốổỗộơờớởỡợ])(?:[aáàảãạăằắẳẵặâầấẩẫậ])\\s+)?h(?:[oóòỏõọôồốổỗộơờớởỡợ])ng\\b"
    - "(?i)\\brap\\s*vi(?:e|ệ)t\\b"
    - "(?i)\\bcover\\b"
    - "(?i)\\bsi(?:e|ê)u\\s*h(?:a|à|á|ả|ã|ạ)i\\b"
    - "(?i)\\bkawaii\\s*kutegomen\\b"
    - "(?i)\\bkejo\\b"

# Discord Message Settings
message:
  # Maximum characters for queue embed before truncating
  embed_char_limit: 2000  # Discord's limit
  embed_buffer: 100  # Safety margin to stay under Discord's limit

# File Storage Settings
storage:
  media_folder: "media"
  log_file: "musicbot.log"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

# YouTube Downloader Options
ytdl_options:
  format: "bestaudio/best"
  noplaylist: true
  quiet: true
  no_warnings: true
  default_search: "auto"
  source_address: "0.0.0.0"
  geo_bypass: true
  extractor_args:
    youtube:
      - "player_client=android"

# FFmpeg Stream Options
ffmpeg:
  before_options: "-reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5"
  audio_only: "-vn"

# Command Permissions (2 roles: admin and non-admin)
permissions:
  # Blocked users cannot run any bot command.
  blocked_user_ids: []

  commands:
    # open: anyone can run
    # admin_only: only users with Discord Administrator permission can run
    # vote_if_non_admin: admins run directly, non-admins must pass vote
    help:
      mode: "open"

    join:
      mode: "open"

    play:
      mode: "open"

    yt:
      mode: "open"

    queue:
      mode: "open"

    skip:
      mode: "vote_if_non_admin"
      vote:
        threshold_type: "ratio"      # ratio or absolute
        threshold_value: 0.5          # 50% when threshold_type is ratio
        min_votes: 1                  # floor for required votes
        same_channel_only: true
        force_vote_for_admin: false   # debug: when true, admins must vote like non-admins

    remove:
      mode: "vote_if_non_admin"

    skipto:
      mode: "admin_only"

    clear:
      mode: "admin_only"

    stop:
      mode: "open"

    volume:
      mode: "admin_only"

    reload_blacklist:
      mode: "admin_only"

    block:
      mode: "admin_only"

    blacklist:
      mode: "open"
